class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      theme:'dark', accent:'indigo', layout:'overview',
      tailFollow:'on', mouseSupport:'on', confirmForce:'always', tmuxPrefix:'spectatui-', configPath:'./.spectatui.toml',
      screen:'dashboard', focus:0, feat:0, setSel:0, editing:null,
      extTab:'extensions', extSel:0, extScroll:0,
      catSel:0, catAdd:null, catAddCursor:0, catTab:'extensions',
      specTab:'spec', scroll:0,
      popup:null, palQuery:'', palSel:0, cliLines:[], cliStatus:'pending', cliCmd:'',
      tailN:4, leSel:0, intSel:0, wfSel:0, flt:'', fltOn:false,
      paneCfg:[
        {kind:'features', label:'Feature list',   visible:true,  size:2},
        {kind:'workflow', label:'Workflow',       visible:true,  size:1},
        {kind:'agent',    label:'Agent output',   visible:true,  size:2},
        {kind:'spec',     label:'Spec browser',   visible:false, size:2},
        {kind:'const',    label:'Constitution',   visible:false, size:2},
        {kind:'ext',      label:'Extensions',     visible:false, size:2},
      ],
    };
    this.buf = null; this.fs = 13; this.cellW = 8; this.cellH = 15;
    this.click = [];
    this.tailIdx = 5;
  }

  componentDidMount(){
    this._key = (e)=>this.onKey(e);
    this._rsz = ()=>{ this.fit(); this.forceUpdate(); };
    this._clk = (e)=>this.onClick(e);
    this._paste = (e)=>this.onPaste(e);
    window.addEventListener('keydown', this._key);
    window.addEventListener('resize', this._rsz);
    window.addEventListener('mousedown', this._clk);
    window.addEventListener('paste', this._paste);
    this.fit();
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{ this.fit(); this.forceUpdate(); }); }
    this._tail = setInterval(()=>{
      const f = FEATURES[this.state.feat];
      this.tailIdx = (this.tailIdx + 1) % AGENT_SCRIPT.length;
      this.forceUpdate();
    }, 1300);
    this._anim = setInterval(()=>{
      if(this.state.screen==='attach' || (this.state.popup&&this.state.popup.kind==='cli')) this.forceUpdate();
    }, 140);
    this.forceUpdate();
  }
  componentWillUnmount(){
    window.removeEventListener('keydown', this._key);
    window.removeEventListener('resize', this._rsz);
    window.removeEventListener('mousedown', this._clk);
    window.removeEventListener('paste', this._paste);
    clearInterval(this._tail);
    clearInterval(this._cliTimer);
    clearInterval(this._anim);
  }

  fit(){
    const W = window.innerWidth, H = window.innerHeight;
    let fs = Math.min(W/(COLS*0.6018), H/(ROWS*1.16));
    fs = Math.max(6, Math.floor(fs*100)/100);
    this.fs = fs; this.cellH = fs*1.16;
    const cv = (this._cv = this._cv || document.createElement('canvas')).getContext('2d');
    cv.font = `${fs}px "JetBrains Mono", monospace`;
    this.cellW = cv.measureText('M').width || fs*0.6018;
  }

  // ---- theme helpers ----
  T(){ return THEMES[this.state.theme]; }
  C(k){
    if(k && k[0]==='#') return k;
    if(k==='accent') return ACCENTS[this.state.accent][this.state.theme];
    return this.T()[k] || this.T().fg;
  }
  stageCol(stage){ const s=STAGE[stage]; return this.state.theme==='dark'? s.d : s.l; }

  // ---- inline list filter ----
  applyFilter(list){
    const q=(this.state.flt||'').trim().toLowerCase();
    if(!q) return list;
    return list.filter(it=>[it.name,it.id,it.key,it.by,it.desc,it.src].filter(Boolean).join(' ').toLowerCase().includes(q));
  }
  curExtListFiltered(){ return this.applyFilter(this.curExtList()); }
  searchKeys(k,stop,selKey){
    const st=this.state;
    if(st.fltOn){
      if(k==='Escape'){ stop(); this.setState({fltOn:false,flt:''}); return true; }
      if(k==='Enter'){ stop(); this.setState({fltOn:false}); return true; }
      if(k==='Backspace'){ stop(); this.setState(Object.assign({flt:st.flt.slice(0,-1)}, selKey?{[selKey]:0}:{})); return true; }
      if(k==='ArrowUp'||k==='ArrowDown') return false;
      if(k.length===1){ stop(); this.setState(Object.assign({flt:st.flt+k}, selKey?{[selKey]:0}:{})); return true; }
      return true;
    }
    if(k==='/'){ stop(); this.setState(Object.assign({fltOn:true,flt:''}, selKey?{[selKey]:0}:{})); return true; }
    return false;
  }
  searchFooter(x,y,w,noun){
    const C=k=>this.C(k);
    if(this.state.fltOn){
      this.fill(x,y,w,1,C('panelAlt'));
      this.text(x+1,y,'/',C('accent'),C('panelAlt'),true);
      const q=this.state.flt, ph='filter '+noun+'…';
      this.text(x+3,y,(q||ph),q?C('fg'):C('faint'),C('panelAlt'),!!q);
      this.put(x+3+(q||ph).length,y,'▌',C('accent'),C('panelAlt'));
      const tail='enter keep · esc clear';
      this.text(x+w-tail.length,y,tail,C('faint'),C('panelAlt'));
    } else {
      this.text(x,y,'[/] ',C('accent'),null,true);
      this.text(x+4,y,'filter '+noun,C('fg'));
      this.reg(x,y,4+('filter '+noun).length,1,()=>this.setState({fltOn:true,flt:''}));
      this.text(x+4+('filter '+noun).length,y,'   esc close',C('faint'));
    }
  }

  // ---- buffer primitives ----
  newBuf(){
    const bg=this.C('bg'), fg=this.C('fg');
    const b=new Array(ROWS);
    for(let y=0;y<ROWS;y++){ const r=new Array(COLS); for(let x=0;x<COLS;x++) r[x]={ch:' ',fg,bg:null,bold:false}; b[y]=r; }
    return b;
  }
  put(x,y,ch,fg,bg,bold){ if(x<0||x>=COLS||y<0||y>=ROWS)return; const cl=this.clipR; if(cl&&(x<cl.x||x>=cl.x+cl.w||y<cl.y||y>=cl.y+cl.h))return; const c=this.buf[y][x]; c.ch=ch; c.fg=fg||this.C('fg'); c.bg=(bg===undefined)?c.bg:bg; c.bold=!!bold; }
  text(x,y,str,fg,bg,bold){ str=String(str); for(let i=0;i<str.length;i++) this.put(x+i,y,str[i],fg,bg,bold); }
  fill(x,y,w,h,bg){ const cl=this.clipR; for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const px=x+i,py=y+j; if(cl&&(px<cl.x||px>=cl.x+cl.w||py<cl.y||py>=cl.y+cl.h))continue; const c=this.buf[py]&&this.buf[py][px]; if(c){c.ch=' ';c.bg=bg;} } }
  hline(x,y,w,fg){ for(let i=0;i<w;i++) this.put(x+i,y,'─',fg); }
  box(x,y,w,h,title,fg,opts){
    opts=opts||{}; const tfg=opts.titleFg||fg;
    const tl=opts.sharp?'┌':'╭', tr=opts.sharp?'┐':'╮', bl=opts.sharp?'└':'╰', br=opts.sharp?'┘':'╯';
    this.put(x,y,tl,fg); this.put(x+w-1,y,tr,fg);
    this.put(x,y+h-1,bl,fg); this.put(x+w-1,y+h-1,br,fg);
    for(let i=1;i<w-1;i++){ this.put(x+i,y,'─',fg); this.put(x+i,y+h-1,'─',fg); }
    for(let j=1;j<h-1;j++){ this.put(x,y+j,'│',fg); this.put(x+w-1,y+j,'│',fg); }
    if(title){ this.put(x+2,y,'┤',fg); this.text(x+3,y,' '+title+' ',tfg,null,!!opts.bold); const end=x+3+title.length+2; this.put(end,y,'├',fg); }
  }
  clip(s,w){ s=String(s); return s.length>w ? (w<=1?s.slice(0,w):s.slice(0,w-1)+'…') : s; }
  reg(x,y,w,h,fn){ this.click.push({x,y,w,h,fn}); }

  // ---- compose ----
  compose(){
    this.buf = this.newBuf(); this.click=[];
    const C=k=>this.C(k);
    const s=this.state.screen;
    if(s==='attach'){ this.drawAttach(); if(this.state.popup) this.drawPopup(); return this.toEl(); }
    this.drawHeader();
    const rect={x:1,y:2,w:COLS-2,h:34};
    if(s==='dashboard') this.drawDashboard(rect);
    else if(s==='extensions') this.drawExtManager(rect, true, false);
    else if(s==='spec') this.drawSpecScreen(rect);
    else if(s==='constitution') this.drawConstitution(rect, true);
    else if(s==='settings') this.drawSettings(rect);
    else if(s==='layouteditor') this.drawLayoutEditor(rect);
    this.drawKeyhint();
    this.drawStatusBar();
    if(this.state.popup) this.drawPopup();
    return this.toEl();
  }

  drawHeader(){
    const C=k=>this.C(k);
    this.fill(0,0,COLS,1,C('headerBg'));
    this.text(2,0,'spectatui',C('accent'),C('headerBg'),true);
    this.text(11,0,'›',C('faint'),C('headerBg'));
    this.text(13,0,'taskify',C('fg'),C('headerBg'));
    this.text(21,0,'~/code/taskify',C('dim'),C('headerBg'));
    const scr={dashboard:'Dashboard',extensions:'Extensions & Presets',spec:'Spec Browser',constitution:'Constitution',settings:'Settings',layouteditor:'Layout Editor'}[this.state.screen];
    const right=`${scr}   ${this.state.theme==='dark'?'◖ dark':'◗ light'}  ◆ ${this.state.accent}`;
    this.text(COLS-2-right.length,0,right,C('dim'),C('headerBg'));
  }

  drawKeyhint(){
    const C=k=>this.C(k); const y=36;
    let hints;
    const p=this.state.popup;
    if(p && p.kind==='palette') hints=[['↑↓','navigate'],['enter','run'],['esc','close'],['type','filter']];
    else if(p && p.kind==='confirm') hints=[['enter','run command'],['esc','cancel'],['f','toggle --force']];
    else if(p && p.kind==='cli') hints=[['esc','close & refresh']];
    else if(p && p.kind==='integrations') hints=[['↑↓','select'],['/','filter'],['i','install'],['x','uninstall'],['d','default'],['s','switch'],['esc','close']];
    else if(p && p.kind==='workflows') hints=[['↑↓','select'],['/','filter'],['r','run'],['s','status'],['a','add'],['esc','close']];
    else if(p && p.kind==='extPresets') hints=[['tab','ext/presets'],['↑↓','select'],['/','filter'],['a','add'],['x','remove'],['c','catalogs'],['esc','close']];

  paneLabel(kind){ return {features:'Feature list',workflow:'Workflow',agent:'Agent output',spec:'Spec browser',const:'Constitution',ext:'Extensions'}[kind]||kind; }
  panesForCustom(r){
    const vis=this.state.paneCfg.filter(p=>p.visible);
    if(!vis.length) return [];
    if(vis.length===1) return [{kind:vis[0].kind, r:{x:r.x,y:r.y,w:r.w,h:r.h}}];
    const sw=Math.min(38,Math.floor(r.w*0.32));
    const out=[{kind:vis[0].kind, r:{x:r.x,y:r.y,w:sw,h:r.h}}];
    const rest=vis.slice(1);
    const minOf=k=>({workflow:11,agent:8,features:8,spec:8,const:8,ext:9}[k]||7);
    const mins=rest.map(p=>minOf(p.kind));
    const minSum=mins.reduce((a,b)=>a+b,0);
    const tot=rest.reduce((a,p)=>a+p.size,0)||1;
    let heights;
    if(minSum<=r.h){
      const extra=r.h-minSum;
      heights=rest.map((p,i)=>mins[i]+Math.floor(extra*p.size/tot));
      const used=heights.reduce((a,b)=>a+b,0); heights[heights.length-1]+=r.h-used;
    } else {
      heights=rest.map(p=>Math.max(3,Math.round(r.h*p.size/tot)));
    }
    let y=r.y;
    rest.forEach((p,i)=>{ out.push({kind:p.kind, r:{x:r.x+sw+1,y,w:r.w-sw-1,h:heights[i]}}); y+=heights[i]; });
    return out;
  }

  stepState(f,stage){

  drawWorkflow(r,focused){
    const C=k=>this.C(k);

    this.box(r.x,r.y,r.w,r.h,'Workflow · '+f.id,bc,{titleFg:focused?C('accent'):C('fg'),bold:focused});
    let x=r.x+3, y=r.y+2;
    STAGE_ORDER.forEach((st,i)=>{
      const ss=this.stepState(f,st);
      if(ss==='done'){ const bg=this.state.theme==='dark'?'#16271b':'#dcefdf'; this.text(x,y,' '+st+' ',C('good'),bg); }
      else if(ss==='cur'){ const [sfg,sbg]=this.stageCol(st); this.text(x,y,' '+st+' ',sfg,sbg,true); }

      x+=st.length+2;
      if(i<STAGE_ORDER.length-1){ this.text(x,y,'─►',C('faint')); x+=3; }
    });
    // progress — height-aware: only draw lines that fit above the bottom border
    const py=r.y+4;

    const fits= py2=> py2<bottom;
    if(fits(py)){
      this.text(r.x+3,py,'Current stage:',C('dim'));

  drawDoc(r,lines,scroll,focused,title){
    const C=k=>this.C(k);
    const bc=focused?C('accent'):C('border');
    this.box(r.x,r.y,r.w,r.h,title,bc,{titleFg:focused?C('accent'):C('fg'),bold:focused});
    const innerW=r.w-4, innerH=r.h-3;
    // flatten with wrapping into render rows
    const rows=[];
    for(const ln of lines){
      const k=ln[0];
      if(k==='blank'){ rows.push([['',null]]); continue; }
      if(k==='h1'){ rows.push([[ln[1],'fg',true,'accent']]); continue; }
      if(k==='h2'){ rows.push([['▍ ','accent'],[ln[1],'fg',true]]); continue; }
      if(k==='meta'){ rows.push([[this.clip(ln[1],innerW),'faint']]); continue; }
      if(k==='code'){ rows.push([['  '+this.clip(ln[1],innerW-2),'info']]); continue; }
      if(k==='li'){
        const wrapped=this.wrap(ln[1],innerW-3);
        wrapped.forEach((w,i)=>{ rows.push(i===0?[['  • ','accent'],[w,'fg']]:[['    ','fg'],[w,'fg']]); });
        continue;
      }
      // p
      const wrapped=this.wrap(ln[1],innerW);
      wrapped.forEach(w=>rows.push([[w,'dim']]));
    }
    const maxScroll=Math.max(0,rows.length-innerH);
    const sc=Math.min(scroll,maxScroll);
    for(let i=0;i<innerH;i++){
      const row=rows[i+sc]; if(!row)break;
      let x=r.x+2; const y=r.y+2+i;
      row.forEach(seg=>{ const [t,col,bold]=seg; this.text(x,y,t,col? (col[0]==='#'?col:C(col)):C('fg'),null,!!bold); x+=String(t).length; });
    }
    // scrollbar
    if(rows.length>innerH){
      const trackH=innerH; const thumb=Math.max(1,Math.round(trackH*innerH/rows.length));
      const tpos=Math.round((trackH-thumb)*(sc/maxScroll));
      for(let i=0;i<trackH;i++) this.put(r.x+r.w-2,r.y+2+i, (i>=tpos&&i<tpos+thumb)?'┃':'│', (i>=tpos&&i<tpos+thumb)?C('accent'):C('border'));
    }
    return maxScroll;
  }
  drawTasks(r,scroll,focused){
    const C=k=>this.C(k);
    const bc=focused?C('accent'):C('border');
    const tasks=this.TASKS();
    const done=tasks.filter(t=>t[0]==='task'&&t[1]).length, total=tasks.filter(t=>t[0]==='task').length;
    this.box(r.x,r.y,r.w,r.h,`tasks.md · ${done}/${total}`,bc,{titleFg:focused?C('accent'):C('fg'),bold:focused});
    const innerH=r.h-3;
    const rows=tasks;
    const maxScroll=Math.max(0,rows.length-innerH);
    const sc=Math.min(scroll,maxScroll);
    for(let i=0;i<innerH;i++){
      const t=rows[i+sc]; if(!t)break; const y=r.y+2+i;
      if(t[0]==='phase'){ this.text(r.x+2,y,'▍ ',C('accent')); this.text(r.x+4,y,t[1],C('fg'),null,true); continue; }
      const [_,checked,par,id,label]=t;
      let x=r.x+3;
      this.text(x,y,checked?'[✓]':'[ ]',checked?C('good'):C('faint'),null,true); x+=4;
      this.text(x,y,id,checked?C('dim'):C('info')); x+=id.length+1;
      if(par){ this.text(x,y,'[P]',C('warn'),null,true); x+=4; }
      this.text(x,y,this.clip(label,r.w-(x-r.x)-3),checked?C('dim'):C('fg')); 
    }
    return maxScroll;
  }
  wrap(s,w){
    s=String(s); const words=s.split(' '); const out=[]; let cur='';
    for(const wd of words){ if((cur+(cur?' ':'')+wd).length>w){ if(cur)out.push(cur); cur=wd; } else cur+=(cur?' ':'')+wd; }
    if(cur)out.push(cur); return out.length?out:[''];
  }

      const [sfg,sbg]=this.stageCol(f.stage);

  // ---- actions ----
  toggleTheme(){ this.setState({theme:this.state.theme==='dark'?'light':'dark'}); }
  cycleAccent(){ const a=['indigo','teal','amber']; this.setState({accent:a[(a.indexOf(this.state.accent)+1)%3]}); }
  startCli(cmd, willFail){
    const word=(cmd.split(' ')[1]||'extension');
    const seq=[
      {t:'Resolving '+word+'…', c:'dim'},
      {t:'→ '+cmd.split(' ').slice(0,3).join(' '), c:'info'},
      {t:'Backing up config to .specify/'+word+'s/.backup/', c:'dim'},
      {t:'✓ backup written', c:'good'},
      {t:'Updating .registry.json', c:'dim'},
      {t:willFail?'✗ error: extension is a dependency of openapi-contracts':'✓ registry updated', c:willFail?'bad':'good'},
    ];
    this.setState({popup:{kind:'cli'}, cliCmd:cmd, cliLines:[], cliStatus:'running'});
    let i=0;
    clearInterval(this._cliTimer);
    this._cliTimer=setInterval(()=>{
      if(i>=seq.length){ clearInterval(this._cliTimer); this.setState({cliStatus:willFail?'fail':'ok'}); return; }
      const lines=this.state.cliLines.concat([seq[i]]); i++;
      this.setState({cliLines:lines});
    },360);
    this._cliSpin=setInterval(()=>this.forceUpdate(),100);
    setTimeout(()=>clearInterval(this._cliSpin),seq.length*360+400);
  }
  buildCmd(action, o){
    o=o||{};
    const force=((o.force!==undefined?o.force:(this.state.popup&&this.state.popup.force))?' --force':'');
    if(o.target==='integration'){
      const id=o.id;
      if(action==='install') return `specify integration install ${id}`;
      if(action==='uninstall') return `specify integration uninstall ${id}${force}`;
      if(action==='use') return `specify integration use ${id}`;
      if(action==='switch') return `specify integration switch ${id}${force}`;
      if(action==='upgrade') return `specify integration upgrade ${id}`;
      if(action==='status') return `specify integration status ${id} --json`;
      if(action==='info') return `specify integration info ${id}`;
      return '';
    }
    if(o.target==='workflow'){
      const id=o.id;
      if(action==='run') return `specify workflow run ${id}`;
      if(action==='resume') return `specify workflow resume ${id}`;
      if(action==='status') return `specify workflow status ${id}`;
      if(action==='add') return `specify workflow add ${id}`;
      if(action==='remove') return `specify workflow remove ${id}${force}`;
      if(action==='info') return `specify workflow info ${id}`;
      return '';
    }
    if(action==='catalog-add'){
      const tgt=CAT_TGT[this.state.catTab];
      const [url,name,prio]=(o.addInput||'').trim().split(/\s+/);
      return `specify ${tgt} catalog add ${url||''} --name ${name||''}`+(prio?` --priority ${prio}`:'');
    }
    if(action==='catalog-remove'){
      const tgt=CAT_TGT[this.state.catTab];
      const src=this.curCatalogList()[this.state.catSel];
      return `specify ${tgt} catalog remove ${src?src.name:''}`;
    }
    const e=this.curExtListFiltered()[this.state.extSel];
    const tgt=this.state.extTab==='extensions'?'extension':'preset';
    if(action==='add') return `specify ${tgt} add ${e.id}`;
    if(action==='remove') return `specify ${tgt} remove ${e.id}${force}`;
    if(action==='enable') return `specify ${tgt} enable ${e.id}`;
    if(action==='disable') return `specify ${tgt} disable ${e.id}`;
    if(action==='resolve') return `specify preset resolve ${e.id}`;
    if(action==='update') return `specify extension update ${e.id}`;
    if(action==='set-priority') return `specify ${tgt} set-priority ${e.id} 75`;
    return '';
  }

  // ---- keyboard ----
  onKey(e){
    const k=e.key; const st=this.state; const p=st.popup;
    const stop=()=>{ e.preventDefault(); e.stopPropagation(); };
    // popups first
    if(p){
      if(p.kind==='palette'){
        const cmds=this.paletteCmds();
        if(k==='Escape'){ stop(); this.setState({popup:null,palQuery:''}); return; }
        if(k==='ArrowDown'){ stop(); this.setState({palSel:Math.min(cmds.length-1,st.palSel+1)}); return; }
        if(k==='ArrowUp'){ stop(); this.setState({palSel:Math.max(0,st.palSel-1)}); return; }
        if(k==='Enter'){ stop(); const c=cmds[st.palSel]; if(c){ this.setState({palQuery:''}); c.run(); } return; }
        if(k==='Backspace'){ stop(); this.setState({palQuery:st.palQuery.slice(0,-1),palSel:0}); return; }
        if(k===':'){ stop(); return; }
        if(k.length===1){ stop(); this.setState({palQuery:st.palQuery+k,palSel:0}); return; }
        return;
      }
      if(p.kind==='confirm'){
        if(k==='Escape'){ stop(); this.setState({popup:null}); return; }
        if(k==='f'||k==='F'){ stop(); const nf=!p.force; this.setState({popup:{...p,force:nf}, cliCmd:this.buildCmd(p.action,{target:p.target,id:p.id,force:nf})}); return; }
        if(k==='Enter'){ stop(); const willFail=(p.action==='remove'&&!p.target&&this.curExtListFiltered()[st.extSel]&&this.curExtListFiltered()[st.extSel].id==='adr-templates'); this.startCli(this.buildCmd(p.action,{target:p.target,id:p.id}),willFail); return; }
        return;
      }
      if(p.kind==='cli'){ if(k==='Escape'){ stop(); clearInterval(this._cliTimer); this.setState({popup:null}); } return; }
      if(p.kind==='extPresets'){ if(this.searchKeys(k,stop,'extSel')) return; this.extKeys(k,stop,true); if(k==='Escape'){ stop(); this.setState({popup:null,fltOn:false,flt:''}); } return; }
      if(p.kind==='catalogs'){
        if(st.catAdd!=null){
          const chars=Array.from(st.catAdd);
          const cursor=Math.min(st.catAddCursor||0, chars.length);
          if(k==='Escape'){ stop(); this.setState({catAdd:null, catAddCursor:0}); return; }
          if(k==='Enter'){ stop(); const input=st.catAdd; this.setState({catAdd:null, catAddCursor:0},()=>{ this.setState({popup:{kind:'confirm',action:'catalog-add',force:false},cliCmd:this.buildCmd('catalog-add',{addInput:input})}); }); return; }
          if(k==='Backspace'){ stop(); if(cursor>0){ const next=chars.slice(0,cursor-1).join('')+chars.slice(cursor).join(''); this.setState({catAdd:next, catAddCursor:cursor-1}); } return; }
          if(k==='Delete'){ stop(); if(cursor<chars.length){ this.setState({catAdd:chars.slice(0,cursor).join('')+chars.slice(cursor+1).join('')}); } return; }
          if(k==='ArrowLeft'){ stop(); this.setState({catAddCursor:Math.max(0,cursor-1)}); return; }
          if(k==='ArrowRight'){ stop(); this.setState({catAddCursor:Math.min(chars.length,cursor+1)}); return; }
          if(k==='Home'){ stop(); this.setState({catAddCursor:0}); return; }
          if(k==='End'){ stop(); this.setState({catAddCursor:chars.length}); return; }
          if(k==='c' && e.ctrlKey){ stop(); this.setState({catAdd:'', catAddCursor:0}); return; }
          if(k.length===1 && !e.ctrlKey && !e.metaKey){ stop(); const next=chars.slice(0,cursor).join('')+k+chars.slice(cursor).join(''); this.setState({catAdd:next, catAddCursor:cursor+1}); return; }
          return;
        }
        const list=this.curCatalogList();
        if(k==='Escape'){ stop(); this.setState({popup:null}); return; }
        if(k==='Tab'){ stop(); const ci=CATALOG_TYPES.indexOf(st.catTab); const d=e.shiftKey?-1:1; this.setState({catTab:CATALOG_TYPES[(ci+d+CATALOG_TYPES.length)%CATALOG_TYPES.length],catSel:0}); return; }
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({catSel:Math.min(list.length-1,st.catSel+1)}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({catSel:Math.max(0,st.catSel-1)}); return; }
        if(k==='a'){ stop(); const src=list[st.catSel]; const discoverOnly=src&&!src.installAllowed; const prefill=discoverOnly?(src.prio!=null?`${src.url} ${src.name} ${src.prio}`:`${src.url} ${src.name}`):''; this.setState({catAdd:prefill, catAddCursor:Array.from(prefill).length}); return; }
        if(k==='x'&&list[st.catSel]){ stop(); this.setState({popup:{kind:'confirm',action:'catalog-remove',force:false},cliCmd:this.buildCmd('catalog-remove')}); return; }
        if(k==='r'){ stop(); return; }
        return;
      }
      if(p.kind==='integrations'){
        if(this.searchKeys(k,stop,'intSel')) return;
        const list=this.applyFilter(INTEGRATIONS), it=list[st.intSel];
        if(k==='Escape'){ stop(); this.setState({popup:null,fltOn:false,flt:''}); return; }
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({intSel:Math.min(list.length-1,st.intSel+1)}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({intSel:Math.max(0,st.intSel-1)}); return; }
        if(!it){ return; }
        const open=(action)=>this.setState({popup:{kind:'confirm',action,target:'integration',id:it.key,name:it.name,force:false},cliCmd:this.buildCmd(action,{target:'integration',id:it.key})});
        if(k==='i'&&!it.installed){ stop(); open('install'); return; }
        if(k==='s'&&(!it.installed||(it.installed&&!it.isDefault))){ stop(); open('switch'); return; }
        if(k==='x'&&it.installed){ stop(); open('uninstall'); return; }
        if(k==='d'&&it.installed&&!it.isDefault){ stop(); open('use'); return; }
        if(k==='g'&&it.installed){ stop(); open('upgrade'); return; }
        if(k==='v'&&it.installed){ stop(); this.startCli(this.buildCmd('status',{target:'integration',id:it.key}),false); return; }
        if(k==='n'){ stop(); this.startCli(this.buildCmd('info',{target:'integration',id:it.key}),false); return; }
        return;
      }
      if(p.kind==='workflows'){
        if(this.searchKeys(k,stop,'wfSel')) return;
        const list=this.applyFilter(WORKFLOWS), wf=list[st.wfSel];
        if(k==='Escape'){ stop(); this.setState({popup:null,fltOn:false,flt:''}); return; }
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({wfSel:Math.min(list.length-1,st.wfSel+1)}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({wfSel:Math.max(0,st.wfSel-1)}); return; }
        if(!wf){ return; }
        const open=(action)=>this.setState({popup:{kind:'confirm',action,target:'workflow',id:wf.id,name:wf.name,force:false},cliCmd:this.buildCmd(action,{target:'workflow',id:wf.id})});
        if(k==='r'&&wf.installed){ stop(); open('run'); return; }
        if(k==='R'&&wf.installed){ stop(); open('resume'); return; }
        if(k==='s'&&wf.installed){ stop(); open('status'); return; }
        if(k==='x'&&wf.installed){ stop(); open('remove'); return; }
        if(k==='a'&&!wf.installed){ stop(); open('add'); return; }
        if(k==='i'){ stop(); this.startCli(this.buildCmd('info',{target:'workflow',id:wf.id}),false); return; }
        return;
      }
      if(p.kind==='features'){
        if(k==='Escape'){ stop(); this.setState({popup:null}); return; }
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({feat:Math.min(FEATURES.length-1,st.feat+1)}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({feat:Math.max(0,st.feat-1)}); return; }
        if(k==='Enter'){ stop(); this.setState({popup:null,screen:'dashboard'}); return; }
        return;
      }
      // simple list popups
      if(k==='Escape'){ stop(); this.setState({popup:null,fltOn:false,flt:''}); return; }
      if(k==='q'){ stop(); this.setState({popup:null}); }
      return;
    }
    if(st.screen==='extensions' && st.fltOn){ if(this.searchKeys(k,stop,'extSel')) return; }
    // global
    if(k===':'||(k==='k'&&(e.metaKey||e.ctrlKey))){ stop(); this.setState({popup:{kind:'palette'},palQuery:'',palSel:0}); return; }
    if(k==='?'){ stop(); this.setState({popup:{kind:'help'}}); return; }
    if(k==='t'){ stop(); this.toggleTheme(); return; }
    if(k==='T'){ stop(); this.cycleAccent(); return; }
    if(k==='C'){ stop(); this.go('constitution'); return; }
    if(k==='q'){ stop(); this.setState({popup:{kind:'quit'}}); return; }
    if(k==='i'){ stop(); this.openPopup('integrations'); return; }
    if(k==='w'){ stop(); this.openPopup('workflows'); return; }
    if(k==='f'){ stop(); this.openPopup('features'); return; }
    if(k==='c'){ stop(); this.openCatalogs(this.state.catTab||'extensions'); return; }
    if(k==='Escape'){ stop(); if(st.screen!=='dashboard') this.go('dashboard'); return; }

    if(st.screen==='dashboard'){
      const panes=this.panesFor();
      if(k==='Tab'){ stop(); const d=e.shiftKey?-1:1; this.setState({focus:(st.focus+d+panes.length)%panes.length}); return; }
      if(k==='1'){ stop(); this.setState({layout:'overview',focus:0}); return; }
      if(k==='2'){ stop(); this.setState({layout:'coding',focus:0}); return; }
      if(k==='3'){ stop(); this.setState({layout:'audit',focus:0}); return; }
      if(k==='e'){ stop(); this.openPopup('extensions'); return; }
      if(k==='p'){ stop(); this.openPopup('presets'); return; }
      if(k==='a'){ stop(); this.setState({screen:'attach'}); return; }
      if(k==='s'){ stop(); this.go('settings'); return; }
      const fk=panes[st.focus]?panes[st.focus].kind:'features';
      if(fk==='features'||fk==='workflow'||fk==='agent'){
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({feat:Math.min(FEATURES.length-1,st.feat+1)}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({feat:Math.max(0,st.feat-1)}); return; }
        if(k==='Enter'){ stop(); this.go('spec'); return; }
      }
      if((fk==='spec'||fk==='const'||fk==='ext')){
        if(k==='ArrowDown'||k==='j'){ stop(); this.setState({scroll:st.scroll+1}); return; }
        if(k==='ArrowUp'||k==='k'){ stop(); this.setState({scroll:Math.max(0,st.scroll-1)}); return; }
      }
      return;
    }
    if(st.screen==='extensions'){ if(this.searchKeys(k,stop,'extSel')) return; this.extKeys(k,stop,false); return; }
    if(st.screen==='spec'){
      if(k==='Tab'){ stop(); const tabs=['spec','plan','tasks','research']; const d=e.shiftKey?-1:1; this.setState({specTab:tabs[(tabs.indexOf(st.specTab)+d+4)%4],scroll:0}); return; }
      if(k==='ArrowDown'||k==='j'){ stop(); this.setState({scroll:Math.min(this._specMax||0,st.scroll+1)}); return; }
      if(k==='ArrowUp'||k==='k'){ stop(); this.setState({scroll:Math.max(0,st.scroll-1)}); return; }
      if(k==='ArrowRight'){ stop(); this.setState({feat:Math.min(FEATURES.length-1,st.feat+1),scroll:0}); return; }
      if(k==='ArrowLeft'){ stop(); this.setState({feat:Math.max(0,st.feat-1),scroll:0}); return; }
    }
    if(st.screen==='constitution'){
      if(k==='ArrowDown'||k==='j'){ stop(); this.setState({scroll:Math.min(this._constMax||0,st.scroll+1)}); return; }
      if(k==='ArrowUp'||k==='k'){ stop(); this.setState({scroll:Math.max(0,st.scroll-1)}); return; }
    }
    if(st.screen==='layouteditor'){
      const pc=st.paneCfg.slice(); const i=st.leSel;
      if(k==='ArrowDown'||k==='j'){ stop(); this.setState({leSel:Math.min(pc.length-1,i+1)}); return; }
      if(k==='ArrowUp'||k==='k'){ stop(); this.setState({leSel:Math.max(0,i-1)}); return; }
      if(k===' '){ stop(); pc[i]={...pc[i],visible:!pc[i].visible}; this.setState({paneCfg:pc}); return; }
      if((k==='<'||k===','||k==='[')&&i>0){ stop(); [pc[i-1],pc[i]]=[pc[i],pc[i-1]]; this.setState({paneCfg:pc,leSel:i-1}); return; }
      if((k==='>'||k==='.'||k===']')&&i<pc.length-1){ stop(); [pc[i+1],pc[i]]=[pc[i],pc[i+1]]; this.setState({paneCfg:pc,leSel:i+1}); return; }
      if(k==='+'||k==='='){ stop(); pc[i]={...pc[i],size:Math.min(4,pc[i].size+1)}; this.setState({paneCfg:pc}); return; }
      if(k==='-'||k==='_'){ stop(); pc[i]={...pc[i],size:Math.max(1,pc[i].size-1)}; this.setState({paneCfg:pc}); return; }
      if(k==='Enter'){ stop(); this.setState({layout:'custom',screen:'dashboard',focus:0}); return; }
      return;
    }
    if(st.screen==='attach'){
      if(k==='a'||k==='r'){ stop(); return; }
      return;
    }
    if(st.screen==='settings'){
      const rows=this.settingsRows();
      if(st.editing!=null){
        const row=rows[st.editing];
        if(k==='Enter'||k==='Escape'){ stop(); this.setState({editing:null}); return; }
        if(k==='Backspace'){ stop(); row.set(row.v.slice(0,-1)); return; }
        if(k.length===1){ stop(); row.set(row.v+k); return; }
        stop(); return;
      }
      if(k==='ArrowDown'||k==='j'){ stop(); this.setState({setSel:Math.min(rows.length-1,st.setSel+1)}); return; }
      if(k==='ArrowUp'||k==='k'){ stop(); this.setState({setSel:Math.max(0,st.setSel-1)}); return; }
      if(k==='ArrowRight'||k==='ArrowLeft'||k==='Enter'||k===' '){ stop(); const row=rows[st.setSel]; if(row.text){ if(k==='Enter'||k==='ArrowRight') this.setState({editing:st.setSel}); } else if(row.opts.length){ const idx=row.opts.indexOf(row.v); const d=(k==='ArrowLeft')?-1:1; row.set(row.opts[(idx+d+row.opts.length)%row.opts.length]); } else if(row.action&&(k==='Enter'||k==='ArrowRight')){ row.action(); } return; }
    }
  }
  extKeys(k,stop,inPopup){
    const st=this.state; const list=this.curExtListFiltered(); const e=list[st.extSel];
    if(k==='Tab'){ stop(); if(inPopup) return; this.setState({extTab:st.extTab==='extensions'?'presets':'extensions',extSel:0,fltOn:false,flt:''}); return; }
    if(k==='ArrowDown'||k==='j'){ stop(); this.setState({extSel:Math.min(list.length-1,st.extSel+1)}); return; }
    if(k==='ArrowUp'||k==='k'){ stop(); this.setState({extSel:Math.max(0,st.extSel-1)}); return; }
    if(!e){ if(k==='Escape'&&!inPopup){ stop(); this.go('dashboard'); } return; }
    if(k==='a'&&e.status==='available'){ stop(); this.setState({popup:{kind:'confirm',action:'add',force:false},cliCmd:`specify ${st.extTab==='extensions'?'extension':'preset'} add ${e.id}`}); return; }
    if(k==='x'&&e.status!=='available'){ stop(); this.setState({popup:{kind:'confirm',action:'remove',force:false},cliCmd:this.buildCmd('remove')}); return; }
    if((k==='e'||k==='d')&&e.status!=='available'){ stop(); const act=e.status==='enabled'?'disable':'enable'; this.setState({popup:{kind:'confirm',action:act,force:false},cliCmd:this.buildCmd(act)}); return; }
    if(k==='u'&&e.status!=='available'&&st.extTab==='extensions'){ stop(); this.setState({popup:{kind:'confirm',action:'update',force:false},cliCmd:this.buildCmd('update')}); return; }
    if(k==='p'&&e.status!=='available'){ stop(); this.setState({popup:{kind:'confirm',action:'set-priority',force:false},cliCmd:this.buildCmd('set-priority')}); return; }
    if(k==='r'&&e.status!=='available'&&st.extTab==='presets'){ stop(); this.startCli(this.buildCmd('resolve'),false); return; }
    if(k==='c'){ stop(); this.openCatalogs(st.extTab); return; }
    if(k==='Escape'&&!inPopup){ stop(); this.go('dashboard'); return; }
  }

  // ---- catalog sources (nested under Extensions/Presets, opened with 'c') ----
  curCatalogList(){ return CATALOG_SOURCES[this.state.catTab]; }

  onPaste(e){
    if(this.state.catAdd==null) return;
    const text=(e.clipboardData||window.clipboardData).getData('text').replace(/[\r\n]/g,'');
    if(!text) return;
    e.preventDefault();
    const chars=Array.from(this.state.catAdd);
    const cursor=Math.min(this.state.catAddCursor||0, chars.length);
    const next=chars.slice(0,cursor).join('')+text+chars.slice(cursor).join('');
    this.setState({catAdd:next, catAddCursor:cursor+Array.from(text).length});
  }

  onClick(e){
    const termW=COLS*this.cellW, termH=ROWS*this.cellH;
    const ox=(window.innerWidth-termW)/2, oy=(window.innerHeight-termH)/2;
    const cx=Math.floor((e.clientX-ox)/this.cellW), cy=Math.floor((e.clientY-oy)/this.cellH);
    for(let i=this.click.length-1;i>=0;i--){ const r=this.click[i]; if(cx>=r.x&&cx<r.x+r.w&&cy>=r.y&&cy<r.y+r.h){ r.fn(); return; } }
  }

  // ---- buffer -> react ----
  toEl(){
    const rows=[]; const cw=this.cellW, ch=this.cellH;
    for(let y=0;y<ROWS;y++){
      const spans=[]; let run=null;
      for(let x=0;x<COLS;x++){
        const c=this.buf[y][x];
        const key=c.fg+'|'+(c.bg||'-')+'|'+(c.bold?1:0);
        if(run&&run.key===key){ run.text+=c.ch; }
        else { if(run)spans.push(run); run={key,text:c.ch,fg:c.fg,bg:c.bg,bold:c.bold}; }
      }
      if(run)spans.push(run);
      rows.push(React.createElement('div',{key:y,className:'term-row',style:{height:ch+'px',lineHeight:ch+'px'}},
        spans.map((s,i)=>React.createElement('span',{key:i,style:{color:s.fg,background:s.bg||undefined,fontWeight:s.bold?700:400}},s.text))
      ));
    }
    return React.createElement('div',{
      style:{ fontFamily:"'JetBrains Mono', ui-monospace, monospace", fontSize:this.fs+'px', lineHeight:ch+'px',
        background:this.C('bg'), color:this.C('fg'), width:(COLS*cw)+'px', height:(ROWS*ch)+'px',
        whiteSpace:'pre', overflow:'hidden', borderRadius:'5px', boxShadow:'0 24px 80px rgba(0,0,0,0.5)', userSelect:'none' }
    }, rows);
  }

  renderVals(){ return { screenEl: this.compose() }; }
}
</script>
