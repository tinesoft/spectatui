<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:100%;container-type:size;">

  <!-- ear tufts: broad swept wedges flaring up-and-out from the crown -->
  <!-- left tuft -->
  <div style="position:absolute;left:17%;top:8%;width:19%;height:24%;background:linear-gradient(135deg,#4f60cb 0%,#6b7ce8 55%,#8a98f3 100%);clip-path:polygon(50% 0,100% 78%,40% 100%);transform:rotate(-26deg);transform-origin:bottom right;"></div>
  <div style="position:absolute;left:20%;top:10%;width:13%;height:19%;background:linear-gradient(135deg,#8a98f3,#aeb9ff);clip-path:polygon(50% 0,100% 80%,46% 100%);transform:rotate(-26deg);transform-origin:bottom right;"></div>
  <!-- right tuft -->
  <div style="position:absolute;left:64%;top:8%;width:19%;height:24%;background:linear-gradient(225deg,#4f60cb 0%,#6b7ce8 55%,#8a98f3 100%);clip-path:polygon(50% 0,0 78%,60% 100%);transform:rotate(26deg);transform-origin:bottom left;"></div>
  <div style="position:absolute;left:67%;top:10%;width:13%;height:19%;background:linear-gradient(225deg,#8a98f3,#aeb9ff);clip-path:polygon(50% 0,0 80%,54% 100%);transform:rotate(26deg);transform-origin:bottom left;"></div>

  <!-- headset band: high squared arch with a gap above the head -->
  <div style="position:absolute;left:11%;top:-2%;width:78%;height:54%;border:4.2cqmin solid #9aa0b2;border-bottom:none;border-radius:46% 46% 0 0;box-sizing:border-box;background:transparent;"></div>
  <div style="position:absolute;left:12%;top:-3%;width:76%;height:54%;border:1.6cqmin solid transparent;border-bottom:none;border-top-color:#e6e8f0;border-radius:46% 46% 0 0;box-sizing:border-box;background:transparent;"></div>

  <!-- body -->
  <div style="position:absolute;left:16%;top:22%;width:68%;height:72%;background:radial-gradient(circle at 50% 30%,#9fafff,#8294f7 70%);border-radius:50% 50% 45% 45%;"></div>
  <!-- belly -->
  <div style="position:absolute;left:30%;top:46%;width:40%;height:42%;background:#bcc6ff;border-radius:50%;"></div>

  <!-- wing: left, layered scalloped feathers -->
  <div style="position:absolute;left:15%;top:50%;width:20%;height:34%;border-radius:60% 40% 50% 50%/70% 70% 40% 40%;background:linear-gradient(120deg,#7385ed,#92a2fb);transform:rotate(8deg);"></div>
  <div style="position:absolute;left:17%;top:54%;width:13%;height:7%;background:#8294f7;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:17%;top:62%;width:13%;height:7%;background:#7c8ef2;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:18%;top:70%;width:12%;height:7%;background:#7385ed;border-radius:50% 50% 60% 60%;"></div>
  <!-- wing: right -->
  <div style="position:absolute;left:65%;top:50%;width:20%;height:34%;border-radius:40% 60% 50% 50%/70% 70% 40% 40%;background:linear-gradient(240deg,#7385ed,#92a2fb);transform:rotate(-8deg);"></div>
  <div style="position:absolute;left:70%;top:54%;width:13%;height:7%;background:#8294f7;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:70%;top:62%;width:13%;height:7%;background:#7c8ef2;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:70%;top:70%;width:12%;height:7%;background:#7385ed;border-radius:50% 50% 60% 60%;"></div>

  <!-- belly feather scallops (two staggered rows) -->
  <div style="position:absolute;left:35%;top:64%;width:9%;height:9%;background:#cdd5ff;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:45.5%;top:64%;width:9%;height:9%;background:#cdd5ff;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:56%;top:64%;width:9%;height:9%;background:#cdd5ff;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:40.5%;top:72%;width:9%;height:9%;background:#c3ccff;border-radius:50% 50% 60% 60%;"></div>
  <div style="position:absolute;left:50.5%;top:72%;width:9%;height:9%;background:#c3ccff;border-radius:50% 50% 60% 60%;"></div>

  <!-- feet -->
  <div style="position:absolute;left:37%;top:88%;width:10%;height:7%;background:#f0a47c;border-radius:0 0 45% 45%;"></div>
  <div style="position:absolute;left:53%;top:88%;width:10%;height:7%;background:#f0a47c;border-radius:0 0 45% 45%;"></div>

  <!-- ear cups: padded domes with cushion + speaker -->
  <div style="position:absolute;left:-1%;top:36%;width:29%;height:29%;border-radius:50%;background:radial-gradient(circle at 38% 30%,#e9ebf1,#b6bbc9 58%,#969cae);"></div>
  <div style="position:absolute;left:73%;top:36%;width:29%;height:29%;border-radius:50%;background:radial-gradient(circle at 62% 30%,#e9ebf1,#b6bbc9 58%,#969cae);"></div>
  <div style="position:absolute;left:4.5%;top:41.5%;width:18%;height:18%;border-radius:50%;background:radial-gradient(circle at 50% 40%,#565b70,#393c4c);"></div>
  <div style="position:absolute;left:77.5%;top:41.5%;width:18%;height:18%;border-radius:50%;background:radial-gradient(circle at 50% 40%,#565b70,#393c4c);"></div>
  <div style="position:absolute;left:10.5%;top:47%;width:5%;height:5%;background:#262833;border-radius:50%;"></div>
  <div style="position:absolute;left:83.5%;top:47%;width:5%;height:5%;background:#262833;border-radius:50%;"></div>

  <!-- eyes -->
  <div style="position:absolute;left:23%;top:33%;width:27%;height:27%;background:radial-gradient(circle at 50% 45%,#fdfbf7,#e7e4dc);border-radius:50%;"></div>
  <div style="position:absolute;left:50%;top:33%;width:27%;height:27%;background:radial-gradient(circle at 50% 45%,#fdfbf7,#e7e4dc);border-radius:50%;"></div>
  <!-- pupils -->
  <div style="position:absolute;left:32%;top:41%;width:12%;height:12%;background:#101013;border-radius:50%;"></div>
  <div style="position:absolute;left:56%;top:41%;width:12%;height:12%;background:#101013;border-radius:50%;"></div>
  <div style="position:absolute;left:34%;top:43%;width:3.5%;height:3.5%;background:#fbf9f4;border-radius:50%;"></div>
  <div style="position:absolute;left:58%;top:43%;width:3.5%;height:3.5%;background:#fbf9f4;border-radius:50%;"></div>

  <!-- beak -->
  <div style="position:absolute;left:44.5%;top:50%;width:11%;height:12%;background:linear-gradient(#f3b088,#e8916a);clip-path:polygon(50% 100%,0 0,100% 0);"></div>

  <!-- mic boom + foam tip (horizontal) -->
  <div style="position:absolute;left:54%;top:62%;width:31%;height:3.5cqmin;background:linear-gradient(#d2d6e1,#a9afc1);border-radius:999px;"></div>
  <div style="position:absolute;left:50%;top:60%;width:10%;height:9%;border-radius:50%;background:radial-gradient(circle at 40% 35%,#4a4d5a,#2a2c36);"></div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:160,&quot;height&quot;:160}}"></script>
</body>
</html>
