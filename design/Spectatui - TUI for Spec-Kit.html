    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

cursor presence. Fallback to polling every 3s when the socket is unavailable.'],\n      ],\n    };\n  }\n  TASKS(){\n    return [\n      ['phase','Phase 1 · Setup'],\n      ['task',true,false,'T001','Scaffold project structure and tooling'],\n      ['task',true,false,'T002','Configure Drizzle + SQLite dev store'],\n      ['phase','Phase 2 · Contract Tests (US1)'],\n      ['task',true,true,'T003','Contract test: POST /projects'],\n      ['task',true,true,'T004','Contract test: POST /cards'],\n      ['task',true,true,'T005','Contract test: PATCH /cards/:id/order'],\n      ['phase','Phase 3 · Core Implementation'],\n      ['task',true,false,'T006','Board model + storage adapter'],\n      ['task',true,false,'T007','Card CRUD endpoints'],\n      ['task',true,true,'T008','Column reorder endpoint'],\n      ['task',true,false,'T009','Realtime channel scaffolding'],\n      ['task',false,false,'T010','Cursor presence broadcast'],\n      ['task',false,false,'T011','Drag-and-drop UI in Column.tsx'],\n      ['task',false,true,'T012','Wire drag handlers + persist order'],\n      ['task',false,true,'T013','Drop-zone highlight states'],\n      ['task',false,false,'T014','Integration test: full reorder flow'],\n    ];\n  }\n  CONSTITUTION(){\n    return [\n      ['h1','Taskify Constitution'],\n      ['meta','.specify/memory/constitution.md · ratified 2025-09-12 · v1.2.0'],\n      ['blank'],\n      ['h2','I. Library-First'],\n      ['p','Every feature starts as a standalone library with a clear contract. Apps are thin shells over libraries. No business logic lives in route handlers.'],\n      ['blank'],\n      ['h2','II. CLI Interface'],\n      ['p','Each library exposes its capabilities over a text-in/text-out CLI. Human-readable by default, --json for machines.'],\n      ['blank'],\n      ['h2','III. Test-First (NON-NEGOTIABLE)'],\n      ['p','TDD is mandatory. Tests are written, approved, and observed to fail before any implementation. Red → Green → Refactor.'],\n      ['blank'],\ ,rect.y,sw,rect.h,'Features',C('border'),{titleFg:C('fg')});\n    FEATURES.forEach((f,i)=>{\n      const y=rect.y+2+i; const sel=(i===this.state.feat);\n      if(sel){ this.fill(rect.x+1,y,sw-2,1,C('sel')); this.put(rect.x+1,y,'▌',C('accent'),C('sel')); }\n      const [sfg,sbg]=this.stageCol(f.stage);\n      this.text(rect.x+3,y,' '+f.stage+' ',sfg,sbg,true);\n      this.text(rect.x+3+f.stage.length+3,y,this.clip(f.id,sw-12),sel?C('selFg'):C('fg'),sel?C('sel'):null,sel);\n      this.reg(rect.x+1,y,sw-2,1,()=>this.setState({feat:i,scroll:0}));\n    });\n    // tabs\n    const dx=rect.x+sw+1, dw=rect.w-sw-1;\n    const tabs=[['spec','spec.md'],['plan','plan.md'],['tasks','tasks.md'],['research','research.md']];\n    let tx=dx+1;\n    tabs.forEach(([k,lbl])=>{\n      const act=this.state.specTab===k;\n      this.text(tx,rect.y,' '+lbl+' ',act?C('accent'):C('dim'),act?C('panelAlt'):null,act);\n      this.reg(tx,rect.y,lbl.length+2,1,()=>this.setState({specTab:k,scroll:0}));\n      tx+=lbl.length+3;\n    });\n    const dr={x:dx,y:rect.y+1,w:dw,h:rect.h-1};\n    if(this.state.specTab==='tasks') this._specMax=this.drawTasks(dr,this.state.scroll,true);\n    else this._specMax=this.drawDoc(dr,this.SPEC_DOC()[this.state.specTab],this.state.scroll,true, this.state.specTab+'.md · '+FEATURES[this.state.feat].id);\n  }\n  drawConstitution(r,focused){\n    this._constMax=this.drawDoc(r,this.CONSTITUTION(),this.state.scroll,focused,'constitution.md');\n  }\n\n  // ---- extensions / presets manager ----\n  curExtList(){ return this.state.extTab==='extensions'?EXTENSIONS:PRESETS; }\n  statusIcon(st){ return st==='enabled'?'●':st==='disabled'?'◐':'○'; }\n  statusCol(st){ return st==='enabled'?this.C('good'):st==='disabled'?this.C('warn'):this.C('faint'); }\n  drawExtManager(r,focused,compact,single){\n    const C=k=>this.C(k);\n    const bc=focused?C('accent'):C('border');\n    const title= single ? (this.state.extTab==='extensions'?'Extensions':'Presets') : 'Extensions & Presets';\n    this.text(dx+1,y,'by '+e.by+'  ·  '+e.src,C('dim')); y+=1;\n      this.text(dx+1,y,(this.state.extTab==='extensions'?e.cmds+' commands':e.cmds+' templates'),C('info')); y+=2;\n      this.wrap(e.desc,dw-2).forEach(w=>{ this.text(dx+1,y,w,C('fg')); y+=1; });\n      y+=1;\n      // actions\n      this.text(dx+1,y,'Actions',C('dim'),null,true); y+=1;\n      const acts=[];\n      if(e.status==='available') acts.push(['a','add','add']);\n      else {\n        acts.push(['x','remove','remove']);\n        acts.push([e.status==='enabled'?'d':'e', e.status==='enabled'?'disable':'enable', e.status==='enabled'?'disable':'enable']);\n        acts.push(['p','set-priority','set-priority']);\n        if(this.state.extTab==='extensions') acts.push(['u','update','update']);\n      }\n      if(this.state.extTab==='presets'&&e.status!=='available') acts.push(['r','resolve','resolve']);\n      acts.forEach(([key,lbl])=>{ this.text(dx+1,y,'['+key+'] ',C('accent'),null,true); this.text(dx+5,y,lbl,C('fg')); y+=1; });\n    }\n    this.text(r.x+2,r.y+r.h-2,compact?'[enter] manage':'[/] search catalog   [c] catalog list',C('faint'));\n  }\n\n  // ---- popups ----\n  openPopup(kind){\n    if(kind==='extensions'){ this.setState({popup:{kind:'extPresets',single:true}, extTab:'extensions', extSel:0}); return; }\n    if(kind==='presets'){ this.setState({popup:{kind:'extPresets',single:true}, extTab:'presets', extSel:0}); return; }\n    this.setState({popup:{kind}, palSel:0, intSel:0, wfSel:0});\n  }\n  go(screen){ this.setState({screen, popup:null, focus:0, scroll:0}); }\n\n  centeredBox(w,h,title){\n    const C=k=>this.C(k);\n    const x=Math.floor((COLS-w)/2), y=Math.floor((ROWS-h)/2);\n    // dim backdrop\n    for(let j=0;j<ROWS;j++)for(let i=0;i<COLS;i++){ const c=this.buf[j][i]; if(this.state.theme==='dark'){ c.fg=this.dimHex(c.fg,0.45);} else {c.fg=this.dimHex(c.fg,0.55);} }\n    this.fill(x,y,w,h,C('panel'));\n    this.box(x,y,w,h,title,C('accent'),{titleFg:C('accent'),bold:true});\n  const c=this.buf[y][x];\n        const key=c.fg+'|'+(c.bg||'-')+'|'+(c.bold?1:0);\n        if(run&&run.key===key){ run.text+=c.ch; }\n        else { if(run)spans.push(run); run={key,text:c.ch,fg:c.fg,bg:c.bg,bold:c.bold}; }\n      }\n      if(run)spans.push(run);\n      rows.push(React.createElement('div',{key:y,className:'term-row',style:{height:ch+'px',lineHeight:ch+'px'}},\n        spans.map((s,i)=>React.createElement('span',{key:i,style:{color:s.fg,background:s.bg||undefined,fontWeight:s.bold?700:400}},s.text))\n      ));\n    }\n    return React.createElement('div',{\n      style:{ fontFamily:\"'JetBrains Mono', ui-monospace, monospace\", fontSize:this.fs+'px', lineHeight:ch+'px',\n        background:this.C('bg'), color:this.C('fg'), width:(COLS*cw)+'px', height:(ROWS*ch)+'px',\n        whiteSpace:'pre', overflow:'hidden', borderRadius:'5px', boxShadow:'0 24px 80px rgba(0,0,0,0.5)', userSelect:'none' }\n    }, rows);\n  }\n\n  renderVals(){ return { screenEl: this.compose() }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
